<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Track Template</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      background:#dbeafe;
      height:100vh;
      overflow:hidden;
    }

    .sidebar{
      width:250px;
      min-height:100vh;
      background:linear-gradient(rgb(238, 90, 115),rgb(255, 106, 0),rgb(255, 174, 0),#4dabff,black);
      color:rgb(0, 187, 255);
     
    }

    .sidebar .nav-link{
      color:rgb(7, 7, 7);
      font-weight:500;
      margin-bottom:8px;
      background:rgba(42, 43, 42, 0.2);
      
     
    }
    #black{

        background:rgb(36, 35, 35);
        color: rgb(232, 230, 230);
    }
    #white{
        background:rgba(255, 255, 255, 0.923);
    }
    #grey{
         background:rgba(104, 103, 103, 0.923);

    }
    #image{
      
      width: 150%;
      height: 100%;
      padding-right: 110px;
      margin-right: 200px;

    }

    .sidebar .nav-link:hover{
      background:rgba(41, 36, 36, 0.2);
      border-radius:8px;
    }

    .topbar{
      background:#2989fe;
      padding:10px 20px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .card{
      border-radius:16px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .list-view .card{
      width:100%;
    }

  </style>
</head>
<body>

<div class="d-flex">

  <div class="sidebar p-3">
    <h3 class="mb-4"><img src="/Users/rudrachakraborty/Desktop/software dev group project /CW2/assets/Sky track logo.png" id="image"></h3>
    

    <nav class="nav flex-column">
      <a class="nav-link"  href="#" id="black">Home</a>
      <a class="nav-link" href="#" id="white">Dashboard</a>
      <a class="nav-link" href="#" id="grey">Team Message</a>
      <a class="nav-link" href="#" id="white">Dependancy</a>
      <a class="nav-link" href="#" id="black">Admin</a>
    </nav>
  </div>

  <div class="flex-grow-1 d-flex flex-column">

    <div class="topbar d-flex justify-content-end align-items-center">
      <div class="d-flex align-items-center gap-2">
        <img src="https://via.placeholder.com/35" class="rounded-circle">
        <strong>Profile</strong>
      </div>
    </div>

    <div class="p-3 d-flex justify-content-between align-items-center">
      <h4>Cards</h4>
      <div>
        <button class="btn btn-primary btn-sm" onclick="setGrid()">Grid</button>
        <button class="btn btn-secondary btn-sm" onclick="setList()">List</button>
      </div>
    </div>

    <div class="container-fluid p-3">
      <div id="cardContainer" class="row g-3">

        <div class="col-md-4 card-item">
          <div class="card p-3">
            <h5>Card 1</h5>
            <p>Example content</p>
          </div>
        </div>

        <div class="col-md-4 card-item">
          <div class="card p-3">
            <h5>Card 2</h5>
            <p>Example content</p>
          </div>
        </div>

        <div class="col-md-4 card-item">
          <div class="card p-3">
            <h5>Card 3</h5>
            <p>Example content</p>
          </div>
        </div>

        <div class="col-md-4 card-item">
          <div class="card p-3">
            <h5>Card 4</h5>
            <p>Example content</p>
          </div>
        </div>

        <div class="col-md-4 card-item">
          <div class="card p-3">
            <h5>Card 5</h5>
            <p>Example content</p>
          </div>
        </div>

        <div class="col-md-4 card-item">
          <div class="card p-3">
            <h5>Card 6</h5>
            <p>Example content</p>
          </div>
        </div>

      </div>
    </div>

  </div>

</div>

<script>

function setList(){
  const items=document.querySelectorAll('.card-item');
  items.forEach(el=>{
    el.classList.remove('col-md-4');
    el.classList.add('col-12');
  });
}

function setGrid(){
  const items=document.querySelectorAll('.card-item');
  items.forEach(el=>{
    el.classList.remove('col-12');
    el.classList.add('col-md-4');
  });
}

</script>

</body>
</html>
