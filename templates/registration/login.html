<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – SkyTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height:100vh; background:linear-gradient(135deg,#6c2eb9 0%,#e91e8c 100%); display:flex; align-items:center; justify-content:center; }
        .login-card { background:#fff; border-radius:16px; padding:40px; width:390px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
        .brand { font-size:1.6rem; font-weight:800; color:#6c2eb9; }
        .brand span { color:#e91e8c; }
        .btn-sky { background:linear-gradient(90deg,#6c2eb9,#e91e8c); color:#fff; border:none; border-radius:8px; padding:10px; width:100%; font-weight:600; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <div class="brand">SKY<span>TRACK</span></div>
        <div class="text-muted small mt-1">Student 1 Team Portal</div>
    </div>
    {% if form.errors %}<div class="alert alert-danger py-2 small">Invalid username or password.</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label fw-semibold small">Username</label><input type="text" name="username" class="form-control" autofocus required></div>
        <div class="mb-4"><label class="form-label fw-semibold small">Password</label><input type="password" name="password" class="form-control" required></div>
        <button type="submit" class="btn-sky">Login</button>
    </form>
    <div class="text-center mt-3 small text-muted">Don't have an account? <a href="{% url 'register' %}" style="color:#6c2eb9;">Register</a></div>
</div>
</body>
</html>
