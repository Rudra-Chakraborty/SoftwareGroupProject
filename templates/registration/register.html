<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register – SkyTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height:100vh; background:linear-gradient(135deg,#6c2eb9 0%,#e91e8c 100%); display:flex; align-items:center; justify-content:center; }
        .card-box { background:#fff; border-radius:16px; padding:40px; width:440px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
        .brand { font-size:1.6rem; font-weight:800; color:#6c2eb9; }
        .brand span { color:#e91e8c; }
        .btn-sky { background:linear-gradient(90deg,#6c2eb9,#e91e8c); color:#fff; border:none; border-radius:8px; padding:10px; width:100%; font-weight:600; }
    </style>
</head>
<body>
<div class="card-box">
    <div class="text-center mb-4"><div class="brand">SKY<span>TRACK</span></div><div class="text-muted small mt-1">Create your account</div></div>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3"><label class="form-label fw-semibold small">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}</div>
        {% endfor %}
        <button type="submit" class="btn-sky mt-2">Create Account</button>
    </form>
    <div class="text-center mt-3 small text-muted">Already have an account? <a href="{% url 'login' %}" style="color:#6c2eb9;">Login</a></div>
</div>
</body>
</html>
