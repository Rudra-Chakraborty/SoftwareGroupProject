{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Track</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }
    /*for the body*/
    body,
    html {
      height: 100%;
    }
    /*for the gif backgroud */
    .bg-gif {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    /* the box*/
    .center-box {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: black;
      text-align: center;
      width: 100%;
      max-width: 350px;
      margin: auto;
    }
    /* header 1 styles */
    h1 {
      margin-bottom: 20px;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    }
    /* header 4 style */
    h4 {
      margin-bottom: 10px;
    }
    /* input button style */
    .input-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.6);
      color: black;
      outline: none;
    }
     
    .input-btn::placeholder {
      color: #555;
    }

    .btn-custom {
      width: 100%;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
    }
     /*login*/
    .btn-login {
      background: #ff8c42;
      color: white;
    }

    .btn-create {
      background: #ff4da6;
      color: white;
    }

    .btn-reset {
      background: white;
      color: black;
      border: 1px solid #ccc;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <img src="{% static 'images/sky.gif' %}" class="bg-gif">

  <div class="center-box">

    <h1>Sky Track</h1>

    <!-- djanfo message-->
    {% for message in messages %}
      <p style="color:red">{{ message }}</p>
    {% endfor %}

    <!-- login-->
    <div id="loginPage">
      <h4>Login via Email</h4>

      <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="action" value="login">

        <input type="email" name="email" class="input-btn" placeholder="Email">
        <input type="password" name="password" class="input-btn" placeholder="Password">

        <button type="submit" class="btn btn-login btn-custom">Login</button>
      </form>


      <button class="btn btn-create btn-custom" onclick="showRegister()">Create Account</button>
      <button class="btn btn-reset btn-custom" onclick="showReset()">Reset Password</button>
    </div>

    <!-- registor-->
    <div id="registerPage" class="hidden">

      <h4>Create Account</h4>

      <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="action" value="register">

        <input type="text" name="first_name" class="input-btn" placeholder="First Name" required>
        <input type="text" name="last_name" class="input-btn" placeholder="Surname" required>
        <input type="email" name="email" class="input-btn" placeholder="Email" required>
        <input type="password" name="password" class="input-btn" placeholder="Password" required>

        <select name="role" class="input-btn" required>
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>

        <button type="submit" class="btn btn-create btn-custom">
          Create Account
        </button>

      </form>

      <button class="btn btn-reset btn-custom" onclick="showLogin()">
        Back
      </button>

    </div>

    <!-- resent-->
    <div id="resetPage" class="hidden">
      <h4>Reset Password</h4>

      <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="action" value="reset">

        <input type="email" name="email" class="input-btn" placeholder="Email">
        <input type="password" name="password" class="input-btn" placeholder="New Password">

        <button type="submit" class="btn btn-reset btn-custom">Reset</button>
      </form>

      <button class="btn btn-reset btn-custom" onclick="showLogin()">Back</button>
    </div>

  </div>

  <script>
    //it will hide it and show accouding to the pages
    function showRegister() {
      document.getElementById("loginPage").classList.add('hidden');
      document.getElementById("registerPage").classList.remove('hidden');
      document.getElementById("resetPage").classList.add('hidden');
    }

    function showLogin() {
      document.getElementById("loginPage").classList.remove('hidden');
      document.getElementById("registerPage").classList.add('hidden');
      document.getElementById("resetPage").classList.add('hidden');
    }

    function showReset() {
      document.getElementById("loginPage").classList.add('hidden');
      document.getElementById("registerPage").classList.add('hidden');
      document.getElementById("resetPage").classList.remove('hidden');
    }
  </script>

</body>

</html>
